<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Log - Route Planner</title>
    
    <!-- Fonts & Leaflet -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-parchment: #f7f5f0;
            --panel-bg: #1e293b;
            --panel-text: #f8fafc;
            --accent-gold: #d97706;
            --accent-muted: #64748b;
            --error-rust: #b91c1c;
            --font-ui: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            display: flex;
            height: 100vh;
            background: var(--bg-parchment);
            color: #0f172a;
        }

        /* Sidebar styling */
        #sidebar {
            width: 380px;
            background: var(--panel-bg);
            color: var(--panel-text);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--accent-muted);
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-gold);
        }

        .controls {
            padding: 24px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input[type="range"], input[type="number"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--accent-muted);
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-family: var(--font-mono);
        }

        .value-display {
            float: right;
            color: var(--accent-gold);
            font-family: var(--font-mono);
        }

        /* Action Buttons */
        .actions {
            padding: 24px;
            background: #0f172a;
            border-top: 1px solid var(--accent-muted);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-gold);
            color: white;
            border: none;
            border-radius: 4px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #b45309;
        }

        /* Map area */
        #map {
            flex-grow: 1;
            height: 100%;
        }

        /* Readout Panel overlaying map */
        #readout {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 320px;
            background: var(--bg-parchment);
            border: 2px solid var(--panel-bg);
            border-radius: 6px;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }

        #readout h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--panel-bg);
        }

        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .badge {
            background-color: var(--accent-gold);
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        .badge.exact {
            background-color: #16a34a;
        }

        .route-step {
            margin-top: 15px;
            font-size: 0.85rem;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .route-step-item {
            padding: 6px 0;
            border-bottom: 1px dashed #cbd5e1;
            display: flex;
            justify-content: space-between;
        }

        .error-message {
            color: var(--error-rust);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Trail Log Planner</h1>
        </div>
        
        <div class="controls">
            <div class="input-group">
                <label>Distance Budget (km) <span class="value-display" id="budgetValue">30 km</span></label>
                <input type="range" id="budget" min="10" max="60" value="30" oninput="document.getElementById('budgetValue').innerText = this.value + ' km'">
            </div>

            <div class="input-group">
                <label>Category Threshold (n) <span class="value-display" id="threshValue">1</span></label>
                <input type="range" id="threshold" min="1" max="5" value="1" oninput="document.getElementById('threshValue').innerText = this.value">
            </div>

            <div style="margin-top: 30px;">
                <label style="font-size: 0.85rem; color: #94a3b8; text-transform: uppercase;">Dataset Details</label>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-top: 10px; line-height: 1.5; color: #cbd5e1;">
                    • Start: Jaipur Junction<br>
                    • End: Jaipur Airport<br>
                    <span id="locCountText">• 8 Intermediate Stops Loaded</span><br>
                    <span style="color: var(--accent-gold); font-size: 0.7rem; margin-top: 5px; display: block;">(Historical, Nature, Food)</span>
                </div>
            </div>

            <!-- Quick Add to Trigger Fallback Heuristic -->
            <div style="margin-top: 24px;">
                <button style="background: #334155; font-size: 0.8rem; padding: 8px;" onclick="injectStressLocations()">
                    Simulate Large Dataset (15 locations)
                </button>
            </div>
        </div>

        <div class="actions">
            <button onclick="computeRoute()">Compute Optimal Route</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="readout">
        <h3>Route Summary</h3>
        <div id="readout-content"></div>
    </div>

    <script>
        // Initialize Map
        const map = L.map('map').setView([26.9124, 75.7873], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Dynamic locations array starting with 10 landmarks
        let locations = [
            { id: 0, name: "Jaipur Junction (Start)", lat: 26.922, lng: 75.787, cat: "START", score: 0 },
            { id: 1, name: "Jaipur Airport (End)", lat: 26.828, lng: 75.805, cat: "END", score: 0 },
            { id: 2, name: "Hawa Mahal", lat: 26.923, lng: 75.826, cat: "Historical", score: 8 },
            { id: 3, name: "City Palace", lat: 26.925, lng: 75.823, cat: "Historical", score: 9 },
            { id: 4, name: "Jantar Mantar", lat: 26.924, lng: 75.824, cat: "Historical", score: 8.5 },
            { id: 5, name: "Amber Fort", lat: 26.985, lng: 75.851, cat: "Historical", score: 10 },
            { id: 6, name: "Jal Mahal", lat: 26.953, lng: 75.846, cat: "Nature", score: 7 },
            { id: 7, name: "Smriti Van", lat: 26.864, lng: 75.810, cat: "Nature", score: 6 },
            { id: 8, name: "LMB Restaurant", lat: 26.919, lng: 75.823, cat: "Food", score: 7.5 },
            { id: 9, name: "Tapri Central", lat: 26.901, lng: 75.800, cat: "Food", score: 8 }
        ];

        let routeLayer = null;
        let markersLayer = L.layerGroup().addTo(map);

        function updateDatasetText() {
            document.getElementById('locCountText').innerText = `• ${locations.length - 2} Intermediate Stops Loaded`;
        }
        updateDatasetText();

        // Draw initial markers
        function drawInitialMarkers() {
            markersLayer.clearLayers();
            locations.forEach((loc, i) => {
                const color = i === 0 ? 'green' : i === 1 ? 'red' : 'gray';
                const marker = L.circleMarker([loc.lat, loc.lng], {
                    radius: i < 2 ? 8 : 6,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(markersLayer);
                marker.bindPopup(`<b>${loc.name}</b><br>Cat: ${loc.cat}<br>Score: ${loc.score}`);
            });
        }
        drawInitialMarkers();

        // Inject simulated locations to test Heuristic Fallback
        function injectStressLocations() {
            if (locations.length > 10) return; // Prevent double injection
            const extra = [
                { id: 10, name: "Albert Hall Museum", lat: 26.911, lng: 75.819, cat: "Historical", score: 7 },
                { id: 11, name: "Birla Mandir", lat: 26.892, lng: 75.815, cat: "Historical", score: 6.5 },
                { id: 12, name: "Nahargarh Fort", lat: 26.937, lng: 75.815, cat: "Historical", score: 9 },
                { id: 13, name: "Sisodia Rani Garden", lat: 26.898, lng: 75.865, cat: "Nature", score: 5.5 },
                { id: 14, name: "Masala Chowk", lat: 26.909, lng: 75.818, cat: "Food", score: 8.5 }
            ];
            locations = [...locations, ...extra];
            updateDatasetText();
            drawInitialMarkers();
            alert("Added 5 more locations! N is now 15. The system will automatically use the Beam + SA Fallback.");
        }

        // Haversine distance calculator
        function getDistance(loc1, loc2) {
            const R = 6371;
            const dLat = (loc2.lat - loc1.lat) * Math.PI / 180;
            const dLng = (loc2.lng - loc1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(loc1.lat * Math.PI / 180) * Math.cos(loc2.lat * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Exact pre-arrival decay evaluation
        function evaluateRoute(routeIdxs, threshold) {
            let totalDist = 0;
            let totalScore = 0;
            let catCounts = {};

            for (let i = 1; i < routeIdxs.length; i++) {
                const prev = locations[routeIdxs[i-1]];
                const curr = locations[routeIdxs[i]];
                const legDist = getDistance(prev, curr);
                
                if (i < routeIdxs.length - 1) {
                    const decay = Math.exp(-0.1 * totalDist);
                    catCounts[curr.cat] = (catCounts[curr.cat] || 0) + 1;
                    const penalty = catCounts[curr.cat] > threshold ? 0.9 : 1.0;
                    totalScore += (curr.score * decay * penalty);
                }
                totalDist += legDist;
            }
            return { score: totalScore, distance: totalDist };
        }

        // Exact DFS Solver (Best for N <= 12)
        function solveExact(budget, threshold) {
            let bestRoute = null;
            let bestScore = -1;
            
            function dfs(currentIdx, currentDist, visited, path) {
                const distToEnd = getDistance(locations[currentIdx], locations[1]);
                if (currentDist + distToEnd <= budget) {
                    const fullPath = [...path, 1];
                    const evalResult = evaluateRoute(fullPath, threshold);
                    if (evalResult.score > bestScore) {
                        bestScore = evalResult.score;
                        bestRoute = {
                            route: [...fullPath],
                            score: evalResult.score,
                            distance: evalResult.distance
                        };
                    }
                }

                for (let i = 2; i < locations.length; i++) {
                    if (!visited.has(i)) {
                        const distToNext = getDistance(locations[currentIdx], locations[i]);
                        const distNextToEnd = getDistance(locations[i], locations[1]);
                        
                        if (currentDist + distToNext + distNextToEnd <= budget) {
                            visited.add(i);
                            path.push(i);
                            dfs(i, currentDist + distToNext, visited, path);
                            path.pop();
                            visited.delete(i);
                        }
                    }
                }
            }

            dfs(0, 0, new Set([0]), [0]);
            return bestRoute;
        }

        // ================= HEURISTIC FALLBACK ALGORITHMS =================

        // Beam Search (Validated S/d1 density metric, Width = 3)
        function solveBeamSearch(budget, threshold) {
            let beams = [[0]];
            let bestCompleteRoute = null;
            let bestCompleteScore = -1;

            for (let step = 0; step < locations.length - 2; step++) {
                let candidates = [];

                for (let path of beams) {
                    const currentIdx = path[path.length - 1];
                    const currentDist = path.reduce((acc, node, idx) => idx === 0 ? 0 : acc + getDistance(locations[path[idx-1]], locations[node]), 0);
                    
                    // Evaluate completing current beam path to the End node (node 1)
                    const distToEnd = getDistance(locations[currentIdx], locations[1]);
                    if (currentDist + distToEnd <= budget) {
                        const candidatePath = [...path, 1];
                        const evalResult = evaluateRoute(candidatePath, threshold);
                        if (evalResult.score > bestCompleteScore) {
                            bestCompleteScore = evalResult.score;
                            bestCompleteRoute = candidatePath;
                        }
                    }

                    // Look for potential intermediate extensions
                    for (let nextIdx = 2; nextIdx < locations.length; nextIdx++) {
                        if (!path.includes(nextIdx)) {
                            const distToNext = getDistance(locations[currentIdx], locations[nextIdx]);
                            const nextToEnd = getDistance(locations[nextIdx], locations[1]);
                            
                            if (currentDist + distToNext + nextToEnd <= budget) {
                                const newPath = [...path, nextIdx];
                                // Use pure S/d1 density metric for ranking the beams
                                const density = locations[nextIdx].score / Math.max(0.1, distToNext);
                                candidates.push({ path: newPath, density: density });
                            }
                        }
                    }
                }

                if (candidates.length === 0) break;

                // Sort by density desc and prune to width of 3
                candidates.sort((a, b) => b.density - a.density);
                beams = candidates.slice(0, 3).map(c => c.path);
            }

            return bestCompleteRoute ? { route: bestCompleteRoute, ...evaluateRoute(bestCompleteRoute, threshold) } : null;
        }

        // Simulated Annealing Refinement
        function solveSimulatedAnnealing(warmStartRoute, budget, threshold) {
            let currentRoute = [...warmStartRoute];
            let currentEval = evaluateRoute(currentRoute, threshold);
            
            let bestRoute = [...currentRoute];
            let bestScore = currentEval.score;

            let T = 100.0;
            const alpha = 0.95;
            const minT = 0.1;

            while (T > minT) {
                // Generate mutations: swap two intermediate nodes, insert an unvisited node, or delete a node
                let mutatedRoute = [...currentRoute];
                const optType = Math.floor(Math.random() * 3);

                if (optType === 0 && mutatedRoute.length > 3) {
                    // Swap two intermediate nodes
                    const idx1 = Math.floor(Math.random() * (mutatedRoute.length - 2)) + 1;
                    const idx2 = Math.floor(Math.random() * (mutatedRoute.length - 2)) + 1;
                    const tmp = mutatedRoute[idx1];
                    mutatedRoute[idx1] = mutatedRoute[idx2];
                    mutatedRoute[idx2] = tmp;
                } else if (optType === 1) {
                    // Try to insert a random unvisited intermediate node
                    const allNodes = Array.from({length: locations.length - 2}, (_, i) => i + 2);
                    const unvisited = allNodes.filter(n => !mutatedRoute.includes(n));
                    if (unvisited.length > 0) {
                        const nodeToInsert = unvisited[Math.floor(Math.random() * unvisited.length)];
                        const insertPos = Math.floor(Math.random() * (mutatedRoute.length - 1)) + 1;
                        mutatedRoute.splice(insertPos, 0, nodeToInsert);
                    }
                } else if (optType === 2 && mutatedRoute.length > 3) {
                    // Try to drop an intermediate node
                    const dropIdx = Math.floor(Math.random() * (mutatedRoute.length - 2)) + 1;
                    mutatedRoute.splice(dropIdx, 1);
                }

                // Verify budget validity of mutated path
                const evalMutated = evaluateRoute(mutatedRoute, threshold);
                if (evalMutated.distance <= budget) {
                    const delta = evalMutated.score - currentEval.score;
                    if (delta > 0 || Math.exp(delta / T) > Math.random()) {
                        currentRoute = [...mutatedRoute];
                        currentEval = evalMutated;

                        if (currentEval.score > bestScore) {
                            bestScore = currentEval.score;
                            bestRoute = [...currentRoute];
                        }
                    }
                }
                T *= alpha;
            }

            return { route: bestRoute, score: bestScore, distance: evaluateRoute(bestRoute, threshold).distance };
        }

        // Master coordinator
        function computeRoute() {
            const budget = parseFloat(document.getElementById('budget').value);
            const threshold = parseInt(document.getElementById('threshold').value);

            // Pre-flight check: Is direct route possible?
            const directDist = getDistance(locations[0], locations[1]);
            if (directDist > budget) {
                updateUI({ route: [0, 1], score: 0, distance: directDist, error: true }, budget, "None");
                return;
            }

            let result = null;
            let method = "";

            if (locations.length <= 12) {
                // GUARANTEED OPTIMAL (Exact Solver)
                result = solveExact(budget, threshold);
                method = "Exact DFS";
            } else {
                // DYNAMIC SCALING FOR LARGE N
                const beamResult = solveBeamSearch(budget, threshold);
                if (beamResult) {
                    result = solveSimulatedAnnealing(beamResult.route, budget, threshold);
                    method = "Beam + SA Refined";
                } else {
                    result = { route: [0, 1], score: 0, distance: directDist };
                    method = "Direct Fallback";
                }
            }

            updateUI(result, budget, method);
        }

        function updateUI(result, budget, method) {
            if (routeLayer) map.removeLayer(routeLayer);
            markersLayer.clearLayers();

            const readout = document.getElementById('readout');
            const content = document.getElementById('readout-content');
            readout.style.display = 'block';

            if (!result || result.error) {
                const coords = [locations[0], locations[1]].map(loc => [loc.lat, loc.lng]);
                routeLayer = L.polyline(coords, {color: 'var(--error-rust)', weight: 4, dashArray: '5, 10'}).addTo(map);
                
                content.innerHTML = `
                    <div class="error-message">Budget (${budget} km) too tight!</div>
                    <div class="metric"><span>Direct Dist:</span> <span>${getDistance(locations[0], locations[1]).toFixed(2)} km</span></div>
                    <div class="metric"><span>Solver Mode:</span> <span class="badge" style="background-color: var(--error-rust)">Failed</span></div>
                `;
                return;
            }

            // Draw successfully planned route
            const coords = result.route.map(idx => [locations[idx].lat, locations[idx].lng]);
            routeLayer = L.polyline(coords, {color: 'var(--accent-gold)', weight: 4, opacity: 0.8}).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            // Highlight chosen nodes
            let stepHtml = '<div class="route-step">';
            result.route.forEach((idx, stepNum) => {
                const loc = locations[idx];
                const isAnchor = idx === 0 || idx === 1;
                
                L.circleMarker([loc.lat, loc.lng], {
                    radius: isAnchor ? 8 : 7,
                    fillColor: isAnchor ? (idx === 0 ? '#16a34a' : '#dc2626') : 'var(--accent-gold)',
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 1
                }).addTo(markersLayer).bindPopup(`<b>${loc.name}</b>`);

                if(stepNum > 0 && stepNum < result.route.length - 1) {
                    stepHtml += `
                        <div class="route-step-item">
                            <span>${stepNum}. ${loc.name}</span>
                            <span style="color:var(--accent-muted)">${loc.score} pts</span>
                        </div>`;
                }
            });
            stepHtml += '</div>';

            const methodClass = method === "Exact DFS" ? "exact" : "";

            content.innerHTML = `
                <div class="metric"><span>Effective Score:</span> <span style="color:var(--accent-gold); font-weight:bold">${result.score.toFixed(2)}</span></div>
                <div class="metric"><span>Distance Used:</span> <span>${result.distance.toFixed(2)} / ${budget} km</span></div>
                <div class="metric"><span>Solver Mode:</span> <span class="badge ${methodClass}">${method}</span></div>
                ${result.route.length > 2 ? stepHtml : '<div class="route-step" style="color:var(--accent-muted)">Direct route taken. No stops fit budget.</div>'}
            `;
        }
    </script>
</body>
</html>
